<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 3</title>
    <style>
    *
    {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body
    {
        background-color: #e8ff82;
        color: rgb(0, 0, 0);
        min-width: 100vh;
        display: flex;
        flex-direction: column;
    }
    header
    {
        background-color: rgb(247, 235, 220);
        padding: 1rem 2rem;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        gap: 15px;
    }
    header h1
    {
        font-size: 1.5rem;
        color: rgb(0, 0, 0);
    }
    main
    {
        flex: 1;
        display: flex;
        padding: 2rem;
        justify-content: center;
        align-items: center;
        padding: 2rem;
        
    }
    footer
    {
        background-color: blue;
        color: blanchedalmond;
        text-align: center;
        padding: 1rem;
        font-size: 0.9;
    }
    .form-section
    {
        background-color: aliceblue;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgb(0, 0, 0);
        width: 100%;
        max-width: 500px;
    }
        .form-group label
    {
font-weight: 600;
font-size: 0,95rem;
color: rgb(45, 0, 247);
    }
        .form-group input, .form-group textarea, .form-group select
    {
        padding: 0.65rem;
        border: 1px solid rgb(255, 23, 23);
        border-radius: 4px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.3s;
    }
    .btn-group
    {
        display: flex;
        flex-direction: row;
        gap: 1rem;
        margin-top: 1rem;
    }
    .btn
    {
        flex: 1;
        padding: 0.75rem;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s;
        font-weight: 600;
    }
    #btnEnviar 
    {
        background-color: cadetblue;
        color: antiquewhite;
    }
    input[type="reset"]
    {
        background-color: brown;
        color: antiquewhite;
    }
    </style>
</head>
<body>
    <header><h1><span>Practica</span> 3</h1></header>
    <main>
<section class="form-section">
    <h2>Formulario de contactos</h2>
    <form action="#" method="post">
<div class="form-group">
    <label form="name">Nombre</label>
    <input type="text" required>
</div>
<div class="form-group">
    <label form="name">Edad</label>
    <input type="number" required>
</div>
<div class="form-group">
    <label form="name">Cumple</label>
    <input type="date" required>
</div>
<div class="form-group">
    <label form="name">Pais</label>
    <select name="pais" id="pais" required>
        <option value="">Seleccione un pais</option>
        <option value="mexico">Mexico</option>
        <option value="chile">Chile</option>
        <option value="Peru">Peru</option>
        
        <option value="Argentina">Argentina</option>
        <option value="Colombia">Colombia</option>
         </select>
</div>
<div class="btn-group">
    <button type="submit">Enviar</button>
        <button type="reset">Limpiar</button>

</div>

    </form>
</section>
    </main>
    <footer><p>&copy; 2023 mi sitio Web. Todos los derechos reversados</p></footer>
</body>
</html>
